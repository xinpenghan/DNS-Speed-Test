name: 🔐 Attest Build Provenance

on:
  release:
    types: [published]
  workflow_dispatch:  # 支持手动触发测试

permissions:
  id-token: write      # Sigstore OIDC
  contents: read       # 读取代码
  attestations: write  # ✨ 关键：写入证明
  actions: read        # 读取构建上下文

jobs:
  attest:
    name: Attest DNS_Speed_Test.exe
    runs-on: windows-latest

    steps:
      # 1️⃣ 下载 Release 中的 exe（与之前方案一致）
      - name: Install GitHub CLI
        run: winget install -e --id GitHub.cli --silent
        shell: pwsh

      - name: Download executable
        run: |
          gh release download ${{ github.event.release.tag_name || github.ref_name }} `
            --repo ${{ github.repository }} `
            --pattern "DNS_Speed_Test.exe" `
            --dir . `
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh

      # 2️⃣ 生成构建证明（核心步骤）
      - name: Generate build provenance attestation
        uses: actions/attest@v4  # ✅ 官方推荐，替代 attest-build-provenance
        with:
          subject-path: 'DNS_Speed_Test.exe'  # 🎯 要证明的文件路径

      # 3️⃣ 输出验证指引
      - name: Print verification guide
        run: |
          echo "✅ Attestation uploaded to GitHub!"
          echo "🔍 Verify with GitHub CLI:"
          echo "gh attestation verify DNS_Speed_Test.exe -R ${{ github.repository }}"
          echo ""
          echo "🌐 View in browser: https://github.com/${{ github.repository }}/attestations"
