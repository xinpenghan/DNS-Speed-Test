# .github/workflows/sign-any-file.yml
name: 🔐 Sign Any File with Sigstore

on:
  workflow_dispatch:  # ✅ 支持手动触发，无需等 Release
    inputs:
      file_name:
        description: '要签名的文件名（如 DNS_Speed_Test.exe）'
        required: true
        default: 'DNS_Speed_Test.exe'

permissions:
  id-token: write
  contents: write

jobs:
  sign:
    runs-on: windows-latest
    steps:
      - name: Install gh & cosign
        run: |
          winget install -e --id GitHub.cli --silent
          winget install -e --id sigstore.cosign --silent
        shell: pwsh

      # 📤 关键：创建一个临时 Release 用于上传待签文件
      - name: Create temp release
        run: |
          $tag = "temp-sign-${{ github.run_id }}"
          gh release create $tag --title "Temp Sign $tag" --notes "Auto-created for signing" --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh

      # ⏳ 暂停 30 秒，等您手动上传文件（见下方操作指南）
      - name: Wait for manual upload (30s)
        run: Start-Sleep -Seconds 30
        shell: pwsh

      # 📥 下载您刚刚上传的文件
      - name: Download uploaded file
        run: |
          $tag = "temp-sign-${{ github.run_id }}"
          $file = "${{ github.event.inputs.file_name }}"
          gh release download $tag --repo ${{ github.repository }} --pattern "$file" --dir . --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh

      # ✍️ 签名
      - name: Sign with Sigstore
        run: |
          $file = "${{ github.event.inputs.file_name }}"
          cosign sign-blob `
            --output-signature "$file.sig" `
            --output-certificate "$file.crt" `
            --oidc-issuer https://token.actions.githubusercontent.com `
            "$file"
        shell: pwsh

      # 📤 上传签名结果
      - name: Upload signatures to same release
        run: |
          $tag = "temp-sign-${{ github.run_id }}"
          $file = "${{ github.event.inputs.file_name }}"
          gh release upload $tag "$file.sig" "$file.crt" --repo ${{ github.repository }} --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh

      # 📝 输出指引
      - name: Print instructions
        run: |
          echo "✅ 签名完成！"
          echo "🔗 下载链接: https://github.com/${{ github.repository }}/releases/tag/temp-sign-${{ github.run_id }}"
          echo "🔍 验证命令: cosign verify-blob --certificate ${{ github.event.inputs.file_name }}.crt --signature ${{ github.event.inputs.file_name }}.sig --certificate-identity-regexp '^https://github.com/${{ github.repository }}/.github/workflows/sign-any-file.yml@.*' --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' ${{ github.event.inputs.file_name }}"
