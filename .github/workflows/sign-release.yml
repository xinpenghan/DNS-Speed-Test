name: 🔐 Sign Release with Sigstore

on:
  release:
    types: [published]

permissions:
  id-token: write   # Sigstore OIDC 必需
  contents: write   # 允许上传签名文件到 Release

jobs:
  sign-release-artifacts:
    name: Sign DNS_Speed_Test.exe
    runs-on: windows-latest

    steps:
      # 1️⃣ 安装 GitHub CLI (gh)
      - name: Install GitHub CLI
        run: winget install -e --id GitHub.cli --silent
        shell: pwsh

      # 2️⃣ 安装 Sigstore cosign
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      # 3️⃣ 下载 Release 中的 exe
      - name: Download executable from Release
        run: |
          gh release download ${{ github.event.release.tag_name }} `
            --repo ${{ github.repository }} `
            --pattern "DNS_Speed_Test.exe" `
            --dir . `
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh

      # 4️⃣ 使用 Sigstore 签名
      - name: Sign with Sigstore
        run: |
          cosign sign-blob `
            --output-signature DNS_Speed_Test.exe.sig `
            --output-certificate DNS_Speed_Test.exe.crt `
            --oidc-issuer https://token.actions.githubusercontent.com `
            DNS_Speed_Test.exe
        shell: pwsh

      # 5️⃣ 上传签名文件到 Release
      - name: Upload signatures to Release
        run: |
          gh release upload ${{ github.event.release.tag_name }} `
            DNS_Speed_Test.exe.sig DNS_Speed_Test.exe.crt `
            --repo ${{ github.repository }} `
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh

      # 6️⃣ 输出成功提示
      - name: Summary
        run: echo "✅ 签名完成！.sig 和 .crt 已自动附加到当前 Release。"
