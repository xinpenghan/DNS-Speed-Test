# .github/workflows/sign-and-attest.yml
name: 🔐 Sign + Attest Release

on:
  release: { types: [published] }

permissions:
  id-token: write
  contents: write
  attestations: write

jobs:
  sign-and-attest:
    runs-on: windows-latest
    steps:
      - name: Install tools
        run: |
          winget install -e --id GitHub.cli --silent
          winget install -e --id sigstore.cosign --silent
        shell: pwsh

      - name: Download executable
        run: |
          gh release download ${{ github.event.release.tag_name }} `
            --repo ${{ github.repository }} `
            --pattern "DNS_Speed_Test.exe" --dir . --clobber
        env: { GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} }
        shell: pwsh

      # 🔹 步骤 A：生成可下载的 .sig/.crt（用户友好）
      - name: Sign with Sigstore (for users)
        run: |
          cosign sign-blob `
            --output-signature DNS_Speed_Test.exe.sig `
            --output-certificate DNS_Speed_Test.exe.crt `
            --oidc-issuer https://token.actions.githubusercontent.com `
            DNS_Speed_Test.exe
        shell: pwsh

      # 🔹 步骤 B：生成构建证明（供应链审计）
      - name: Attest build provenance (for auditors)
        uses: actions/attest@v4
        with:
          subject-path: 'DNS_Speed_Test.exe'

      # 🔹 步骤 C：上传所有产物
      - name: Upload all artifacts
        run: |
          gh release upload ${{ github.event.release.tag_name }} `
            DNS_Speed_Test.exe.sig DNS_Speed_Test.exe.crt `
            --repo ${{ github.repository }} --clobber
        env: { GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} }
        shell: pwsh

      - name: Summary
        run: |
          echo "✅ 完成！"
          echo "📦 用户可下载: .exe + .sig + .crt → 用 cosign 验证"
          echo "🔍 审计者可运行: gh attestation verify DNS_Speed_Test.exe -R ${{ github.repository }}"
